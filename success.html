.success-card p{color:#657970;line-height:1.8}
.success-card a{display:inline-block;margin-top:18px;background:linear-gradient(90deg,#ffaa36,#ffd184);padding:14px 22px;border-radius:14px;color:#3d2d0e;text-decoration:none;font-weight:900}
